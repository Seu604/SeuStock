<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 읽기 모드 카드 -->
<div th:fragment="view"
     th:id="'item-' + ${item.externalId}"
     data-item-card
     class="rounded-lg border border-slate-200 bg-white p-4 flex flex-col gap-3">

    <div class="flex items-center gap-3">
        <img th:if="${item.primaryImageExternalId != null}"
             th:src="@{/images/{id}(id=${item.primaryImageExternalId})}"
             alt=""
             class="h-14 w-14 rounded-md object-cover border border-slate-200 shrink-0">
        <div th:unless="${item.primaryImageExternalId != null}"
             class="h-14 w-14 rounded-md border border-slate-200 bg-slate-50 shrink-0"></div>
        <div class="min-w-0">
            <p class="text-sm font-semibold text-slate-800 truncate" th:text="${item.name}"></p>
            <p class="text-xs text-slate-400 mt-0.5"
               th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd')}"></p>
        </div>
    </div>

    <p class="text-sm text-slate-500 flex-1 min-h-[1.25rem]"
       th:text="${item.description != null and !item.description.isEmpty()} ? ${item.description} : '—'"></p>

    <div class="flex gap-2 justify-end border-t border-slate-100 pt-2">
        <button class="text-sm text-blue-600 hover:text-blue-800 transition"
                th:attr="hx-get=@{/items/{id}/edit(id=${item.externalId})},hx-target='#item-' + ${item.externalId}"
                hx-swap="outerHTML">수정</button>
        <button class="text-sm text-red-500 hover:text-red-700 transition"
                th:attr="hx-delete=@{/items/{id}(id=${item.externalId})},hx-confirm=|'${item.name}' 품목을 삭제하시겠습니까?|"
                hx-target="#item-list"
                hx-swap="outerHTML">삭제</button>
    </div>
</div>

<!-- 수정 모드 카드 -->
<div th:fragment="edit"
     th:id="'item-' + ${item.externalId}"
     data-item-card
     class="rounded-lg border border-blue-300 bg-white p-4 flex flex-col gap-3">

    <div>
        <input type="file" name="imageFile" data-image-file
               accept="image/jpeg,image/png,image/webp,image/gif"
               class="block w-full text-xs text-slate-500
                      file:mr-2 file:rounded-md file:border-0 file:bg-slate-100 file:px-3 file:py-2
                      file:text-xs file:font-semibold file:text-slate-700 hover:file:bg-slate-200">
        <img data-image-preview
             class="hidden mt-2 h-14 w-14 rounded-md object-cover border border-slate-200"
             alt="">
        <input type="hidden" name="imageHash" data-image-hash value="">
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">품목명 *</label>
        <input type="text" name="name" th:value="${item.name}"
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">설명</label>
        <input type="text" name="description" th:value="${item.description}"
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
               placeholder="설명 (선택)">
    </div>

    <p class="text-xs text-slate-400"
       th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd')}"></p>

    <div class="flex gap-2 justify-end border-t border-slate-100 pt-2">
        <button class="text-sm text-blue-600 hover:text-blue-800 transition"
                th:attr="hx-put=@{/items/{id}(id=${item.externalId})},hx-target='#item-' + ${item.externalId},hx-include='#item-' + ${item.externalId}"
                hx-swap="outerHTML"
                hx-encoding="multipart/form-data"
                data-submit-btn>저장</button>
        <button class="text-sm text-slate-500 hover:text-slate-700 transition"
                th:attr="hx-get=@{/items/{id}/cancel(id=${item.externalId})},hx-target='#item-' + ${item.externalId}"
                hx-swap="outerHTML">취소</button>
    </div>
</div>

<script>
(function () {
    var card = document.currentScript.closest('[data-item-card]');
    if (!card) return;
    initImageUpload({
        fileInputSelector: '[data-image-file]',
        previewSelector:   '[data-image-preview]',
        hashInputSelector: '[data-image-hash]',
        submitSelector:    '[data-submit-btn]'
    }, card);
})();
</script>
</body>
</html>
