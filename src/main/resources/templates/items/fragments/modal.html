<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4 p-6">

        <h2 class="text-lg font-semibold text-slate-800 mb-4">품목 추가</h2>

        <form th:object="${form}"
              method="post"
              enctype="multipart/form-data"
              hx-post="/items"
              hx-encoding="multipart/form-data"
              hx-target="#modal"
              hx-swap="outerHTML">

            <div class="mb-3">
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    사진 <span class="text-slate-400 font-normal">(선택)</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer w-full rounded-md border border-dashed
                              border-slate-300 px-3 py-2 text-sm text-slate-500
                              hover:border-blue-400 hover:text-blue-500 transition"
                       id="item-modal-image-label">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <span id="item-modal-image-label-text">사진을 선택하세요</span>
                    <input type="file" th:field="*{imageFile}"
                           accept="image/jpeg,image/png,image/webp,image/gif"
                           class="sr-only">
                </label>
                <img id="item-modal-preview"
                     class="hidden mt-2 w-full aspect-square rounded-md object-cover border border-slate-200"
                     alt="이미지 미리보기">
            </div>

            <div class="mb-3">
                <label class="block text-sm font-medium text-slate-700 mb-1">품목명 *</label>
                <input type="text" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                       placeholder="예: 충전기, 드라이버 세트"
                       autofocus>
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    설명 <span class="text-slate-400 font-normal">(선택)</span>
                </label>
                <input type="text" th:field="*{description}"
                       th:classappend="${#fields.hasErrors('description')} ? 'border-red-400'"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                       placeholder="간단한 설명">
                <span th:if="${#fields.hasErrors('description')}"
                      th:errors="*{description}"
                      class="mt-1 block text-xs text-red-500"></span>
            </div>

            <input type="hidden" th:field="*{imageHash}" id="item-modal-image-hash">

            <div class="flex gap-2 justify-end">
                <button type="button"
                        hx-get="/empty"
                        hx-target="#modal"
                        hx-swap="outerHTML"
                        class="rounded-md border border-slate-300 px-4 py-2 text-sm text-slate-600
                               hover:bg-slate-50 transition">
                    취소
                </button>
                <button type="submit"
                        id="item-modal-submit-btn"
                        class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white
                               hover:bg-blue-700 transition">
                    추가
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    initImageUpload({
        fileInputSelector:  '#modal input[name="imageFile"]',
        previewSelector:    '#item-modal-preview',
        hashInputSelector:  '#item-modal-image-hash',
        submitSelector:     '#item-modal-submit-btn',
        labelTextSelector:  '#item-modal-image-label-text'
    });
</script>

<!-- 성공 응답: OOB로 카드 추가 + 빈 상태 제거 + 모달 닫기 -->
<th:block th:fragment="created">
    <div id="item-cards" hx-swap-oob="afterbegin">
        <div th:replace="~{items/fragments/card :: view}"></div>
    </div>
    <p id="item-empty-msg" hx-swap-oob="true"></p>
    <div id="modal"></div>
</th:block>

</body>
</html>
