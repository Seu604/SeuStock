<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     id="modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl mx-4 p-6 max-h-[80vh] flex flex-col">

        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-slate-800">변경기록</h2>
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="text-slate-400 hover:text-slate-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="overflow-y-auto flex-1">
            <p th:if="${history.empty}"
               class="py-8 text-center text-sm text-slate-400">거래 기록이 없습니다.</p>

            <table th:unless="${history.empty}"
                   class="w-full text-sm border-collapse">
                <thead>
                    <tr class="border-b border-slate-200 text-xs text-slate-500 text-left">
                        <th class="pb-2 pr-3 font-medium">날짜</th>
                        <th class="pb-2 pr-3 font-medium">유형</th>
                        <th class="pb-2 pr-3 font-medium">위치</th>
                        <th class="pb-2 pr-3 font-medium">시리얼/로트</th>
                        <th class="pb-2 pr-3 font-medium">상태</th>
                        <th class="pb-2 font-medium">메모</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${history}"
                        class="border-b border-slate-100 last:border-0">
                        <td class="py-2 pr-3 text-slate-500 whitespace-nowrap"
                            th:text="${#temporals.format(tx.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="py-2 pr-3">
                            <span th:text="${tx.transactionType.label}"
                                  th:classappend="${tx.transactionType.name() == 'IN'} ? 'text-blue-600' :
                                                  (${tx.transactionType.name() == 'OUT'} ? 'text-red-500' : 'text-slate-600')"
                                  class="font-medium"></span>
                        </td>
                        <td class="py-2 pr-3 text-slate-700">
                            <span th:text="${tx.spaceName}"></span>
                            <span th:if="${tx.shelfName != null}"
                                  th:text="' › ' + ${tx.shelfName}"
                                  class="text-slate-400"></span>
                            <span th:if="${tx.boxName != null}"
                                  th:text="' › ' + ${tx.boxName}"
                                  class="text-slate-400"></span>
                        </td>
                        <td class="py-2 pr-3 text-slate-500">
                            <span th:if="${tx.serialNumber != null}" th:text="${tx.serialNumber}"></span>
                            <span th:if="${tx.serialNumber != null and tx.lotNumber != null}"> / </span>
                            <span th:if="${tx.lotNumber != null}" th:text="${tx.lotNumber}"></span>
                            <span th:if="${tx.serialNumber == null and tx.lotNumber == null}"
                                  class="text-slate-300">—</span>
                        </td>
                        <td class="py-2 pr-3 text-slate-500"
                            th:text="${tx.status.label}"></td>
                        <td class="py-2 text-slate-500"
                            th:text="${tx.memo != null and !tx.memo.isEmpty()} ? ${tx.memo} : '—'"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-end pt-4 border-t border-slate-100 mt-4">
            <button type="button"
                    hx-get="/empty"
                    hx-target="#modal"
                    hx-swap="outerHTML"
                    class="rounded-md border border-slate-300 px-4 py-2 text-sm text-slate-600
                           hover:bg-slate-50 transition">
                닫기
            </button>
        </div>
    </div>
</div>

</body>
</html>
