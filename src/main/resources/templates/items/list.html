<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>내 품목 · SeuStock</title>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<div id="modal"></div>

<main class="mx-auto w-full max-w-4xl px-4 py-10">

    <div class="mb-6 flex flex-wrap items-center justify-between gap-y-2">
        <h1 class="text-2xl font-bold text-slate-800">내 품목</h1>
        <button type="button"
                hx-get="/items/new"
                hx-target="#modal"
                hx-swap="outerHTML"
                class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white
                       hover:bg-blue-700 transition">
            + 품목 추가
        </button>
    </div>

    <div id="item-list"
         th:fragment="item-list"
         class="overflow-hidden rounded-lg border border-slate-200 bg-white">
        <div class="hidden md:grid grid-cols-[minmax(0,1.4fr)_minmax(0,1.3fr)_minmax(0,0.7fr)_minmax(0,0.8fr)_8rem] gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3 text-xs font-semibold uppercase tracking-wide text-slate-500">
            <div>품목</div>
            <div>설명</div>
            <div>재고</div>
            <div>공간</div>
            <div class="text-right">관리</div>
        </div>

        <p id="item-empty-msg"
           th:if="${items.empty}"
           class="px-4 py-10 text-center text-sm text-slate-400">
            등록된 품목이 없습니다. 위 버튼으로 추가해보세요.
        </p>

        <div id="item-cards"
             class="divide-y divide-slate-100">
            <th:block th:each="item : ${items}">
                <div th:replace="~{items/fragments/card :: view}"></div>
            </th:block>
        </div>
    </div>

</main>

</body>
</html>
