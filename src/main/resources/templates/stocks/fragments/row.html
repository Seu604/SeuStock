<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  view-response: 입출고 POST 응답 (OOB 모달 닫기 + 행 갱신)
                 컨트롤러에서 model.addAttribute("stock", ...) 후 반환
-->
<th:block th:fragment="view-response">
    <div id="modal" hx-swap-oob="true"></div>
    <tr th:id="'stock-' + ${stock.externalId}" class="hover:bg-slate-50 transition">
        <td class="px-4 py-3 text-sm text-slate-800" th:text="${stock.itemName}"></td>
        <td class="px-4 py-3 text-sm text-right font-mono font-medium"
            th:classappend="${stock.quantity == 0} ? 'text-slate-400' : 'text-slate-800'"
            th:text="${stock.quantity}"></td>
        <td class="px-4 py-3 text-center">
            <div class="flex items-center justify-center gap-1">
                <button type="button"
                        class="rounded px-2 py-0.5 text-xs font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 transition"
                        th:attr="hx-get=@{/stocks/{id}/in-form(id=${stock.externalId})}"
                        hx-target="#modal" hx-swap="outerHTML">입고</button>
                <button type="button"
                        class="rounded px-2 py-0.5 text-xs font-semibold text-orange-600 bg-orange-50 hover:bg-orange-100 transition"
                        th:attr="hx-get=@{/stocks/{id}/out-form(id=${stock.externalId})}"
                        hx-target="#modal" hx-swap="outerHTML">출고</button>
            </div>
        </td>
        <td class="px-4 py-3 text-center">
            <button type="button"
                    class="text-xs text-red-400 hover:text-red-600 transition"
                    th:attr="hx-delete=@{/stocks/{id}(id=${stock.externalId})},hx-confirm='재고를 삭제하시겠습니까?'"
                    hx-target="closest tr" hx-swap="outerHTML">삭제</button>
        </td>
    </tr>
</th:block>

<!--
  view: 패널 내 각 재고 행 렌더링용 (panel.html에서 th:each로 호출)
        stock 파라미터를 받아 렌더링
-->
<tr th:fragment="view(stock)"
    th:id="'stock-' + ${stock.externalId}"
    class="hover:bg-slate-50 transition">

    <td class="px-4 py-3 text-sm text-slate-800" th:text="${stock.itemName}"></td>

    <td class="px-4 py-3 text-sm text-right font-mono font-medium"
        th:classappend="${stock.quantity == 0} ? 'text-slate-400' : 'text-slate-800'"
        th:text="${stock.quantity}"></td>

    <td class="px-4 py-3 text-center">
        <div class="flex items-center justify-center gap-1">
            <button type="button"
                    class="rounded px-2 py-0.5 text-xs font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 transition"
                    th:attr="hx-get=@{/stocks/{id}/in-form(id=${stock.externalId})}"
                    hx-target="#modal" hx-swap="outerHTML">입고</button>
            <button type="button"
                    class="rounded px-2 py-0.5 text-xs font-semibold text-orange-600 bg-orange-50 hover:bg-orange-100 transition"
                    th:attr="hx-get=@{/stocks/{id}/out-form(id=${stock.externalId})}"
                    hx-target="#modal" hx-swap="outerHTML">출고</button>
        </div>
    </td>

    <td class="px-4 py-3 text-center">
        <button type="button"
                class="text-xs text-red-400 hover:text-red-600 transition"
                th:attr="hx-delete=@{/stocks/{id}(id=${stock.externalId})},hx-confirm='재고를 삭제하시겠습니까?'"
                hx-target="closest tr" hx-swap="outerHTML">삭제</button>
    </td>

</tr>

</body>
</html>
