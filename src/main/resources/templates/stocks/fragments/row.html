<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  view: 패널 내 각 재고 카드 렌더링용 (panel.html에서 th:each로 호출)
        stock 파라미터를 받아 렌더링. 위치 변수(spaceExternalId 등)는 모델에서 자동 참조.
-->
<div th:fragment="view(stock)"
     th:id="'item-' + ${stock.itemExternalId}"
     class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 transition">

    <!-- 썸네일 -->
    <img th:if="${stock.displayImageExternalId != null}"
         th:src="@{/images/{id}(id=${stock.displayImageExternalId})}"
         alt=""
         class="h-12 w-12 shrink-0 rounded-md object-cover border border-slate-200">
    <span th:unless="${stock.displayImageExternalId != null}"
          class="h-12 w-12 shrink-0 rounded-md border border-slate-200 bg-slate-50 inline-block"></span>

    <!-- 품목명 + 액션 버튼 -->
    <div class="flex-1 min-w-0">
        <div class="text-sm font-medium text-slate-800 truncate" th:text="${stock.itemName}">품목명</div>
        <div class="mt-1.5 flex items-center gap-1 flex-wrap">
            <button type="button"
                    class="rounded px-2 py-0.5 text-xs font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 transition"
                    th:attr="hx-get=@{/stocks/in-form(itemExternalId=${stock.itemExternalId},spaceExternalId=${spaceExternalId},shelfExternalId=${shelfExternalId},boxExternalId=${boxExternalId})}"
                    hx-target="#modal" hx-swap="outerHTML">입고</button>
            <button type="button"
                    class="rounded px-2 py-0.5 text-xs font-semibold text-orange-600 bg-orange-50 hover:bg-orange-100 transition"
                    th:attr="hx-get=@{/stocks/out-form(itemExternalId=${stock.itemExternalId},spaceExternalId=${spaceExternalId},shelfExternalId=${shelfExternalId},boxExternalId=${boxExternalId})}"
                    hx-target="#modal" hx-swap="outerHTML">출고</button>
            <button type="button"
                    class="rounded px-2 py-0.5 text-xs font-semibold text-red-400 hover:text-red-600 transition"
                    th:attr="hx-delete=@{/stocks(itemExternalId=${stock.itemExternalId},spaceExternalId=${spaceExternalId},shelfExternalId=${shelfExternalId},boxExternalId=${boxExternalId})},hx-confirm='이 위치의 재고를 모두 삭제하시겠습니까?'"
                    hx-target="#stock-panel" hx-swap="outerHTML">삭제</button>
        </div>
    </div>

    <!-- 수량 -->
    <div class="shrink-0 text-right">
        <span class="text-base font-mono font-semibold"
              th:classappend="${stock.count == 0} ? 'text-slate-300' : 'text-slate-800'"
              th:text="${stock.count}"></span>
        <div class="text-xs text-slate-400">개</div>
    </div>

</div>

</body>
</html>
