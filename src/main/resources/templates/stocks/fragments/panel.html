<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  stock-panel-response: POST /stocks 응답 (OOB 모달 닫기 + 패널 갱신)
  stock-panel: HTMX 위치 선택 시 패널 교체용
  공통 내용은 panel-content fragment로 분리
-->

<th:block th:fragment="stock-panel-response">
    <div id="modal" hx-swap-oob="true"></div>
    <div id="stock-panel" class="rounded-lg border border-slate-200 bg-white overflow-hidden">
        <th:block th:replace="~{:: panel-content}"></th:block>
    </div>
</th:block>

<div th:fragment="stock-panel"
     id="stock-panel"
     class="rounded-lg border border-slate-200 bg-white overflow-hidden">
    <th:block th:replace="~{:: panel-content}"></th:block>
</div>

<th:block th:fragment="panel-content">

    <div class="px-4 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
        <div class="flex items-center gap-2 text-sm text-slate-600">
            <span class="text-slate-400">📦</span>
            <span th:text="${breadcrumb}">위치</span>
        </div>
        <button th:attr="hx-get=@{/stocks/new(spaceId=${spaceExternalId},shelfId=${shelfExternalId},boxId=${boxExternalId})}"
                hx-target="#modal"
                hx-swap="outerHTML"
                class="rounded-md bg-blue-600 px-3 py-1 text-xs font-semibold text-white hover:bg-blue-700 transition">
            + 재고 추가
        </button>
    </div>

    <table class="w-full">
        <thead class="bg-slate-50 border-b border-slate-200">
            <tr>
                <th class="px-4 py-2 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">품목명</th>
                <th class="px-4 py-2 text-right text-xs font-semibold text-slate-500 uppercase tracking-wide w-20">수량</th>
                <th class="px-4 py-2 text-center text-xs font-semibold text-slate-500 uppercase tracking-wide w-28">입출고</th>
                <th class="px-4 py-2 text-center text-xs font-semibold text-slate-500 uppercase tracking-wide w-16">삭제</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">

            <tr th:if="${stocks.empty}">
                <td colspan="4" class="px-4 py-8 text-center text-sm text-slate-400">
                    이 위치에 등록된 재고가 없습니다.
                </td>
            </tr>

            <th:block th:each="stock : ${stocks}">
                <th:block th:replace="~{stocks/fragments/row :: view(stock=${stock})}"></th:block>
            </th:block>

        </tbody>
    </table>

</th:block>

</body>
</html>
