<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="view(stock)"
     th:id="'stock-' + ${stock.externalId}"
     class="grid gap-3 px-4 py-4 md:grid-cols-[minmax(0,1.2fr)_minmax(0,1.2fr)_minmax(0,0.9fr)_minmax(0,1fr)_minmax(0,1fr)_10rem] md:items-center">

    <div class="flex min-w-0 items-center gap-3">
        <img th:src="${stock.displayImageExternalId != null} ? @{/images/{id}(id=${stock.displayImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
             alt=""
             class="h-12 w-12 shrink-0 rounded-md border border-slate-200 object-cover">
        <div class="min-w-0">
            <p class="truncate text-sm font-semibold text-slate-800" th:text="${stock.itemName}">품목명</p>
            <p class="mt-0.5 text-xs text-slate-400"
               th:text="${#temporals.format(stock.createdAt, 'yyyy-MM-dd')}">등록일</p>
        </div>
    </div>

    <div class="min-w-0 text-sm text-slate-600">
        <span th:text="${stock.spaceName}">공간</span>
        <th:block th:if="${stock.shelfName != null}">
            <span class="text-slate-300"> / </span><span th:text="${stock.shelfName}">선반</span>
        </th:block>
        <th:block th:if="${stock.boxName != null}">
            <span class="text-slate-300"> / </span><span th:text="${stock.boxName}">박스</span>
        </th:block>
    </div>

    <div class="text-sm text-slate-600">
        <p>
            <span class="text-xs text-slate-400">SN</span>
            <span th:text="${stock.serialNumber != null and !stock.serialNumber.isEmpty()} ? ${stock.serialNumber} : '-'"></span>
        </p>
        <p class="mt-0.5">
            <span class="text-xs text-slate-400">LOT</span>
            <span th:text="${stock.lotNumber != null and !stock.lotNumber.isEmpty()} ? ${stock.lotNumber} : '-'"></span>
        </p>
    </div>

    <div class="text-sm">
        <span class="inline-flex rounded-full bg-blue-50 px-2.5 py-0.5 text-xs font-semibold text-blue-700"
              th:text="#{${'enum.StockStatus.' + stock.status.name()}}">재고중</span>
        <p class="mt-1 text-xs text-slate-400"
           th:text="${stock.expirationDate != null ? #messages.msg('view.stock.form.expiration.format', #temporals.format(stock.expirationDate, 'yyyy-MM-dd')) : #messages.msg('view.stock.form.expiration.none')}"></p>
    </div>

    <div class="min-w-0 text-sm text-slate-600">
        <p class="line-clamp-2"
           th:text="${stock.memo != null and !stock.memo.isEmpty()} ? ${stock.memo} : '-'">메모</p>
    </div>

    <div class="flex justify-end gap-2">
        <button type="button"
                th:attr="hx-get=@{/stocks/{id}/edit(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId}"
                hx-swap="outerHTML"
                class="rounded-md border border-slate-300 px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition"
                th:text="#{view.common.edit}">
            수정
        </button>
        <button type="button"
                th:attr="hx-delete=@{/stocks/{id}(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId},hx-confirm=#{view.stock.detail.deleteConfirm(${stock.itemName})}"
                hx-swap="outerHTML"
                class="rounded-md border border-red-200 px-3 py-1.5 text-sm font-semibold text-red-600 hover:bg-red-50 transition"
                th:text="#{view.common.delete}">
            삭제
        </button>
    </div>
</div>

<div th:fragment="edit"
     th:id="'stock-' + ${stock.externalId}"
     th:object="${form}"
     class="grid gap-3 border-l-4 border-blue-500 bg-blue-50/40 px-4 py-4 md:grid-cols-[minmax(0,1.2fr)_minmax(0,1.2fr)_minmax(0,0.9fr)_minmax(0,1fr)_minmax(0,1fr)_10rem] md:items-start">

    <div class="flex min-w-0 items-center gap-3">
        <img th:src="${stock.displayImageExternalId != null} ? @{/images/{id}(id=${stock.displayImageExternalId})} : @{/image/placeholder/item_placeholder_v2.png}"
             alt=""
             class="h-12 w-12 shrink-0 rounded-md border border-slate-200 object-cover">
        <div class="min-w-0">
            <p class="truncate text-sm font-semibold text-slate-800" th:text="${stock.itemName}">품목명</p>
            <p class="mt-0.5 text-xs text-slate-400"
               th:text="${stock.spaceName}">위치</p>
        </div>
    </div>

    <div class="text-sm text-slate-600">
        <span th:text="${stock.spaceName}">공간</span>
        <th:block th:if="${stock.shelfName != null}">
            <span class="text-slate-300"> / </span><span th:text="${stock.shelfName}">선반</span>
        </th:block>
        <th:block th:if="${stock.boxName != null}">
            <span class="text-slate-300"> / </span><span th:text="${stock.boxName}">박스</span>
        </th:block>
    </div>

    <div class="space-y-2">
        <div>
            <label class="mb-1 block text-xs font-medium text-slate-500" th:text="#{view.stock.form.serial.label}">시리얼 번호</label>
            <input type="text" th:field="*{serialNumber}"
                   class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p th:if="${#fields.hasErrors('serialNumber')}" th:errors="*{serialNumber}"
               class="mt-1 text-xs text-red-500"></p>
        </div>
        <div>
            <label class="mb-1 block text-xs font-medium text-slate-500" th:text="#{view.stock.form.lot.label}">로트 번호</label>
            <input type="text" th:field="*{lotNumber}"
                   class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p th:if="${#fields.hasErrors('lotNumber')}" th:errors="*{lotNumber}"
               class="mt-1 text-xs text-red-500"></p>
        </div>
    </div>

    <div>
        <label class="mb-1 block text-xs font-medium text-slate-500" th:text="#{view.stock.form.expiration.label}">유통기한</label>
        <input type="date" th:field="*{expirationDate}"
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p class="mt-2 text-xs text-slate-400" th:text="#{${'enum.StockStatus.' + stock.status.name()}}">재고중</p>
    </div>

    <div>
        <label class="mb-1 block text-xs font-medium text-slate-500" th:text="#{view.stock.form.memo.label}">메모</label>
        <textarea th:field="*{memo}" rows="3"
                  class="w-full resize-y rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
    </div>

    <div class="flex justify-end gap-2">
        <button type="button"
                th:attr="hx-put=@{/stocks/{id}(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId},hx-include='#stock-' + ${stock.externalId}"
                hx-swap="outerHTML"
                class="rounded-md bg-blue-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-blue-700 transition"
                th:text="#{view.common.save}">
            저장
        </button>
        <button type="button"
                th:attr="hx-get=@{/stocks/{id}/cancel(id=${stock.externalId})},hx-target='#stock-' + ${stock.externalId}"
                hx-swap="outerHTML"
                class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition"
                th:text="#{view.common.cancel}">
            취소
        </button>
    </div>
</div>

</body>
</html>
