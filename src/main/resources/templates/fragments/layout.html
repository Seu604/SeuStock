<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!--/* 공통 <head> — 모든 페이지에서 th:replace="~{fragments/layout :: head(~{::title})}" 로 사용 */-->
<head th:fragment="head(titleContent)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${titleContent}">SeuStock</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/image-upload.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Pretendard Variable"', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#3b82f6',
                            hover:   '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
    <script>
        (function () {
            function ensureToastContainer() {
                var container = document.getElementById('toast-container');
                if (container) return container;

                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed right-4 top-4 z-[60] flex w-[min(24rem,calc(100vw-2rem))] flex-col gap-2';
                document.body.appendChild(container);
                return container;
            }

            function showToast(detail) {
                var message = detail && detail.message ? detail.message : '요청을 처리했습니다.';
                var type = detail && detail.type ? detail.type : 'success';
                var isError = type === 'error';
                var toast = document.createElement('div');
                toast.className = 'rounded-md border px-4 py-3 text-sm shadow-lg transition ' +
                    (isError
                        ? 'border-red-200 bg-red-50 text-red-700'
                        : 'border-emerald-200 bg-emerald-50 text-emerald-700');
                toast.textContent = message;
                ensureToastContainer().appendChild(toast);

                window.setTimeout(function () {
                    toast.classList.add('opacity-0');
                    window.setTimeout(function () { toast.remove(); }, 200);
                }, 2800);
            }

            window.SeuStockToast = showToast;

            function replaceModalFromResponse(xhr) {
                if (!xhr || !xhr.responseText) return false;
                var parser = new DOMParser();
                var doc = parser.parseFromString(xhr.responseText, 'text/html');
                var incomingModal = doc.getElementById('modal');
                if (!incomingModal || !incomingModal.hasAttribute('data-error-modal')) return false;

                var currentModal = document.getElementById('modal');
                var insertedModal;
                if (currentModal) {
                    currentModal.outerHTML = incomingModal.outerHTML;
                    insertedModal = document.getElementById('modal');
                } else {
                    document.body.insertAdjacentHTML('beforeend', incomingModal.outerHTML);
                    insertedModal = document.getElementById('modal');
                }
                if (insertedModal && window.htmx) {
                    window.htmx.process(insertedModal);
                }
                return true;
            }

            document.addEventListener('app:toast', function (event) {
                showToast(event.detail);
            });

            document.addEventListener('htmx:responseError', function (event) {
                if (!replaceModalFromResponse(event.detail && event.detail.xhr)) {
                    showToast({ type: 'error', message: '요청을 처리하지 못했습니다.' });
                }
            });
        })();
    </script>
    <script th:if="${toastMessage != null}" th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            window.SeuStockToast({
                type: /*[[${toastType}]]*/ 'success' || 'success',
                message: /*[[${toastMessage}]]*/ '요청을 처리했습니다.'
            });
        });
    </script>
</head>

<!--/* 공통 네비게이션 바 */-->
<nav th:fragment="nav" class="border-b border-slate-200 bg-white">
    <div class="mx-auto max-w-5xl px-4 py-3 flex items-center justify-between">
        <a href="/" class="text-lg font-semibold text-slate-800 tracking-tight">SeuStock</a>

        <!--/* 데스크탑: md 이상에서 가로 나열 */-->
        <div class="hidden md:flex items-center gap-x-4 text-sm">
            <th:block th:if="${session.loginUser != null}">
                <a href="/spaces"
                   class="text-slate-600 hover:text-slate-900 transition">내 공간</a>
                <span class="text-slate-300">|</span>
                <a href="/items"
                   class="text-slate-600 hover:text-slate-900 transition">내 품목</a>
                <span class="text-slate-300">|</span>
                <a href="/stocks"
                   class="text-slate-600 hover:text-slate-900 transition">내 재고</a>
                <span class="text-slate-300">|</span>
                <span class="text-slate-500" th:text="${session.loginUser}"></span>
                <a href="/logout"
                   class="text-slate-600 hover:text-slate-900 transition">로그아웃</a>
            </th:block>
            <th:block th:if="${session.loginUser == null}">
                <a href="/login"
                   class="text-slate-600 hover:text-slate-900 transition">로그인</a>
                <a href="/register"
                   class="rounded-md bg-blue-600 px-3 py-1.5 font-medium text-white
                          hover:bg-blue-700 transition">회원가입</a>
            </th:block>
        </div>

        <!--/* 모바일: md 미만에서 드롭다운 */-->
        <details class="relative md:hidden text-sm">
            <summary class="list-none cursor-pointer select-none rounded px-3 py-1.5
                            text-slate-600 hover:text-slate-900 hover:bg-slate-100 transition">
                메뉴 ▾
            </summary>
            <div class="absolute right-0 top-full mt-1 min-w-[120px] rounded-md
                        border border-slate-200 bg-white shadow-md py-1 z-50">
                <th:block th:if="${session.loginUser != null}">
                    <div class="px-3 py-1.5 text-xs text-slate-400"
                         th:text="${session.loginUser}"></div>
                    <hr class="border-slate-100 mx-2 my-1"/>
                    <a href="/spaces"
                       class="block px-3 py-2 text-slate-700 hover:bg-slate-50 transition">내 공간</a>
                    <a href="/items"
                       class="block px-3 py-2 text-slate-700 hover:bg-slate-50 transition">내 품목</a>
                    <a href="/stocks"
                       class="block px-3 py-2 text-slate-700 hover:bg-slate-50 transition">내 재고</a>
                    <hr class="border-slate-100 mx-2 my-1"/>
                    <a href="/logout"
                       class="block px-3 py-2 text-slate-700 hover:bg-slate-50 transition">로그아웃</a>
                </th:block>
                <th:block th:if="${session.loginUser == null}">
                    <a href="/login"
                       class="block px-3 py-2 text-slate-700 hover:bg-slate-50 transition">로그인</a>
                    <a href="/register"
                       class="block px-3 py-2 text-blue-600 font-medium hover:bg-slate-50 transition">회원가입</a>
                </th:block>
            </div>
        </details>
    </div>
</nav>

</html>
