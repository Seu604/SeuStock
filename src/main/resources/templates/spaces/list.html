<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="|#{view.space.list.title} · SeuStock|">내 공간 · SeuStock</title>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="mx-auto w-full max-w-3xl px-4 py-10 flex-1">

    <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-slate-800" th:text="#{view.space.list.title}">내 공간</h1>
    </div>

    <!-- 공간 추가 폼 -->
    <form th:action="@{/spaces}" th:object="${form}" method="post"
          class="mb-6 flex flex-col sm:flex-row sm:items-start gap-2">
        <div class="flex-1">
            <input type="text" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'border-red-400'"
                   class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                          transition"
                   th:placeholder="#{view.space.list.addPlaceholder}">
            <span th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"
                  class="mt-1 block text-xs text-red-500"></span>
        </div>
        <button type="submit"
                class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white
                       hover:bg-blue-700 transition whitespace-nowrap"
                th:text="|+#{view.common.add}|">
            + 추가
        </button>
    </form>

    <!-- 공간 목록 -->
    <div id="space-list-section" th:fragment="space-list-section" class="space-y-3">
        <div class="rounded-lg border border-slate-200 bg-white px-4 py-3 space-y-2">
            <form hx-get="/spaces"
                  hx-target="#space-list-section"
                  hx-select="#space-list-section"
                  hx-swap="outerHTML"
                  hx-push-url="true"
                  class="flex items-center gap-2">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <input type="hidden" name="page" value="1">
                <span class="shrink-0 rounded-md border border-slate-200 bg-slate-50 px-2 py-1.5 text-xs text-slate-500" th:text="#{view.space.list.searchLabel}">공간명</span>
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       th:placeholder="#{view.space.list.searchPlaceholder}"
                       class="flex-1 min-w-0 rounded-md border border-slate-200 px-3 py-1.5 text-sm text-slate-700 placeholder-slate-400 focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400">
                <button type="submit"
                        class="shrink-0 rounded-md bg-slate-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-slate-700 transition"
                        th:text="#{view.common.search}">
                    검색
                </button>
            </form>
            <div class="flex flex-wrap gap-1">
                <button th:attr="hx-get=@{/spaces(sortBy='newest',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'newest'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2.5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.common.sort.newest}">
                    가장 최신 순
                </button>
                <button th:attr="hx-get=@{/spaces(sortBy='oldest',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'oldest'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2.5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.common.sort.oldest}">
                    가장 오래된 순
                </button>
                <button th:attr="hx-get=@{/spaces(sortBy='name',keyword=${keyword})}"
                        hx-target="#space-list-section" hx-select="#space-list-section" hx-swap="outerHTML" hx-push-url="true"
                        th:classappend="${sortBy == 'name'} ? 'bg-blue-100 text-blue-700 ring-1 ring-blue-300' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'"
                        class="rounded-full px-2.5 py-0.5 text-xs font-medium transition"
                        th:text="#{view.common.sort.name}">
                    공간명 순
                </button>
            </div>
        </div>

        <div id="space-list"
             th:fragment="space-list"
             class="overflow-hidden rounded-lg border border-slate-200 bg-white">
            <div class="hidden md:grid grid-cols-[minmax(0,1.5fr)_minmax(0,1fr)_14rem] gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3 text-xs font-semibold uppercase tracking-wide text-slate-500">
                <div th:text="#{view.space.list.table.space}">공간</div>
                <div th:text="#{view.space.list.table.registeredAt}">등록일</div>
                <div class="text-right" th:text="#{view.space.list.table.manage}">관리</div>
            </div>

            <div th:if="${spaces.empty}"
                 class="px-4 py-10 text-center text-sm text-slate-400"
                 th:text="#{view.space.list.empty}">
                등록된 공간이 없습니다. 위에서 추가해보세요.
            </div>

            <div id="space-list-rows"
                 th:if="${!spaces.empty}"
                 class="divide-y divide-slate-100">
                <th:block th:each="space : ${spaces}">
                    <th:block th:replace="~{spaces/fragments/row :: view}"></th:block>
                </th:block>
            </div>
        </div>

        <div id="space-list-more" th:fragment="space-list-more" class="flex justify-center">
            <button th:if="${page.hasNext()}"
                    th:attr="hx-get=@{/spaces(page=${page.nextPage()},sortBy=${sortBy},keyword=${keyword},append=true)}"
                    hx-target="#space-list-more"
                    hx-swap="outerHTML"
                    class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition"
                    th:text="#{view.space.list.more}">
                더 보기
            </button>
        </div>

    </div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
