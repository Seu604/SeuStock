<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>내 공간 · SeuStock</title>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="mx-auto w-full max-w-3xl px-4 py-10">

    <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-slate-800">내 공간</h1>
    </div>

    <!-- 공간 추가 폼 -->
    <form th:action="@{/spaces}" th:object="${form}" method="post"
          class="mb-6 flex flex-col sm:flex-row sm:items-start gap-2">
        <div class="flex-1">
            <input type="text" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'border-red-400'"
                   class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                          transition"
                   placeholder="새 공간 이름">
            <span th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"
                  class="mt-1 block text-xs text-red-500"></span>
        </div>
        <button type="submit"
                class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white
                       hover:bg-blue-700 transition whitespace-nowrap">
            + 추가
        </button>
    </form>

    <!-- 공간 목록 -->
    <div id="space-list"
         th:fragment="space-list"
         class="overflow-hidden rounded-lg border border-slate-200 bg-white">
        <div class="hidden md:grid grid-cols-[minmax(0,1.5fr)_minmax(0,1fr)_14rem] gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3 text-xs font-semibold uppercase tracking-wide text-slate-500">
            <div>공간</div>
            <div>등록일</div>
            <div class="text-right">관리</div>
        </div>

        <div th:if="${spaces.empty}"
             class="px-4 py-10 text-center text-sm text-slate-400">
            등록된 공간이 없습니다. 위에서 추가해보세요.
        </div>

        <div th:if="${!spaces.empty}" class="divide-y divide-slate-100">
            <th:block th:each="space : ${spaces}">
                <th:block th:replace="~{spaces/fragments/row :: view}"></th:block>
            </th:block>
        </div>

    </div>

</main>

</body>
</html>
