spring.application.name=SeuStock

server.port=8080

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.seu.seustock.model.dto
mybatis.type-handlers-package=com.seu.seustock.configuration
mybatis.configuration.map-underscore-to-camel-case=true

app.base-url=http://localhost:8080
# QR 코드에 삽입되는 URL. 한 번 QR을 출력한 뒤에는 절대 변경하지 않아야 합니다.
# 서버 주소가 바뀌면 이 URL에서 새 주소로 리다이렉트를 설정하세요.
app.qr-base-url=${app.base-url}

spring.ai.ollama.chat.model=gemma3:4b

# YOLO image preprocessing service
seustock.ai.yolo.enabled=false
seustock.ai.yolo.image-size=640
seustock.ai.yolo.confidence-threshold=0.25
seustock.ai.yolo.iou-threshold=0.7

# Security
security.bcrypt.strength=10

# Logging
logging.level.root=WARN
logging.level.com.seu.seustock=INFO
logging.level.org.springframework.ai=DEBUG
