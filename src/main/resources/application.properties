spring.application.name=SeuStock

server.port=8080

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.seu.seustock.model.dto
mybatis.type-handlers-package=com.seu.seustock.configuration
mybatis.configuration.map-underscore-to-camel-case=true

seustock.upload-dir=uploads/images
app.base-url=http://localhost:8080

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=gemma4:e2b

# Logging
logging.level.root=WARN
logging.level.com.seu.seustock=INFO
logging.level.org.springframework.ai=DEBUG