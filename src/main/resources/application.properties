spring.application.name=SeuStock

server.port=8080

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.seu.seustock.model.dto
mybatis.type-handlers-package=com.seu.seustock.configuration
mybatis.configuration.map-underscore-to-camel-case=true

app.base-url=http://localhost:8080
# QR 코드에 삽입되는 URL. 한 번 QR을 출력한 뒤에는 절대 변경하지 않아야 합니다.
# 서버 주소가 바뀌면 이 URL에서 새 주소로 리다이렉트를 설정하세요.
app.qr-base-url=${app.base-url}

spring.ai.ollama.chat.model=gemma3:4b

# YOLO image preprocessing service
seustock.ai.yolo.enabled=false
seustock.ai.yolo.image-size=640
seustock.ai.yolo.confidence-threshold=0.25
seustock.ai.yolo.iou-threshold=0.7
seustock.ai.yolo.connect-timeout-seconds=5
seustock.ai.yolo.read-timeout-seconds=30

# Ollama AI service timeouts
seustock.ai.ollama.connect-timeout-seconds=10
seustock.ai.ollama.read-timeout-seconds=120

# Image storage backend: minio(default) or local
seustock.image-storage.type=minio

# 더미 초기 데이터 생성기. local 개발 환경에서만 활성화.
seustock.datainit.enabled=false

# Security
security.bcrypt.strength=10

# Password reset (Redis 토큰 TTL / 재발송 쿨다운)
seustock.password-reset.token-ttl=30m
seustock.password-reset.resend-cooldown=60s
# 메일 발송 백엔드. 현재는 logging(개발용)만 구현. 추후 smtp 구현 추가 예정.
seustock.mail.type=logging
seustock.mail.from=no-reply@seustock.local

# Session
spring.session.store-type=redis
spring.session.redis.namespace=seustock:session
spring.session.timeout=30m
server.servlet.session.timeout=30m

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging
logging.level.root=WARN
logging.level.com.seu.seustock=INFO
logging.level.org.springframework.ai=DEBUG

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# File Upload Limits
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:12MB}

